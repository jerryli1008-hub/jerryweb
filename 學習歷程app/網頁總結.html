<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學習紀錄APP</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; background: #121212; color: white; padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: auto; position: relative; min-height: 100vh; padding-bottom: 100px; }
        h1 { color: #00adb5; margin-top: 0; font-size: 24px; text-align: center; margin-bottom: 25px; }

        .main-layout { display: flex; gap: 20px; align-items: flex-start; }
        .left-panel { flex: 7; background: #222; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        .right-panel { flex: 3; display: flex; flex-direction: column; gap: 20px; }

        .input-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .input-item { display: flex; flex-direction: column; }
        
        label { font-size: 14px; color: #00adb5; margin-bottom: 5px; font-weight: bold; }
        input, select { background: #333; color: white; border: 1px solid #444; padding: 10px; border-radius: 5px; font-size: 14px; }

        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(1); cursor: pointer; opacity: 1;
        }

        .button-group { margin: 20px 0; display: flex; gap: 10px; }
        .main-btn { background: #00adb5; color: white; border: none; padding: 15px; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; transition: 0.3s; }
        .main-btn:hover { background: #008f95; }
        .export-btn { background: #455a64; width: 40%; }

        .footer-zone { margin-top: 60px; text-align: center; border-top: 1px solid #333; padding-top: 20px; }
        .clear-all-btn { background: transparent; color: #444; border: 1px solid #222; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; transition: 0.3s; }
        .clear-all-btn:hover { color: #ff4500; border-color: #ff4500; }

        table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 15px; }
        th { background: #333; color: #eee; padding: 10px; border-bottom: 2px solid #00adb5; }
        td { border-bottom: 1px solid #333; padding: 10px; text-align: center; }
        .table-select { background: #1a1a1a; border: 1px solid #444; padding: 5px; border-radius: 4px; cursor: pointer; font-weight: bold; outline: none; }
        
        /* 理解狀況顏色定義 */
        .c-5 { color: #00ff00 !important; } .c-4 { color: #adff2f !important; } 
        .c-3 { color: #ffff00 !important; } .c-2 { color: #ffa500 !important; } .c-1 { color: #ff4500 !important; }
        
        .timer-btn { background: #00adb5; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>學習紀錄APP</h1>

    <div class="main-layout">
        <div class="left-panel">
            <div class="input-grid">
                <div class="input-item"><label>科目</label>
                    <select id="subject">
                        <option>國文</option><option>英文</option><option>數學</option>
                        <option>物理</option><option>化學</option><option>地理</option>
                        <option>公民</option><option>歷史</option>
                    </select>
                </div>
                <div class="input-item"><label>章節</label><input type="text" id="chapter" placeholder="輸入單元名稱"></div>
                <div class="input-item"><label>日期</label><input type="date" id="date"></div>
                <div class="input-item"><label>目前時間</label><input type="time" id="time"></div>
                <div class="input-item" style="grid-column: span 2;"><label>學習時間 (分鐘)</label><input type="number" id="studyMin" placeholder="手動輸入或從計時器帶入"></div>
            </div>

            <div class="button-group">
                <button class="main-btn" onclick="saveData()">💾 儲存紀錄</button>
                <button class="main-btn export-btn" onclick="exportCSV()">📤 匯出表格</button>
            </div>

            <h2 style="font-size: 18px; color: #00adb5; border-left: 4px solid #00adb5; padding-left: 10px;">📜 歷史學習日誌</h2>
            <table>
                <thead>
                    <tr><th>科目</th><th>章節</th><th>日期</th><th>理解狀況</th><th>分鐘</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="right-panel">
            <div class="mini-timer" style="background: #1a1a1a; padding: 20px; border-radius: 12px; border: 1px solid #00adb5; text-align: center;">
                <h2 style="font-size:16px; margin:0;">⏱️ 倒數計時器</h2>
                <div id="timerDisplay" style="font-size: 42px; color: #00ff00; margin: 15px 0; font-family: monospace;">25:00</div>
                <div style="margin-bottom: 15px;">
                    <input type="number" id="setMinutes" value="25" style="width:50px; text-align:center;"> min
                </div>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button class="timer-btn" onclick="toggleTimer()">開始/暫停</button>
                    <button class="timer-btn" onclick="resetTimer()" style="background: #444;">重置</button>
                </div>
            </div>
            
            <div class="mini-chart" style="background: #1a1a1a; padding: 20px; border-radius: 12px; border: 1px solid #333; text-align: center;">
                <h2 style="font-size:16px; margin-bottom:15px; color: #00adb5;">📊 時間分配統計</h2>
                <canvas id="myPieChart"></canvas>
            </div>
        </div>
    </div>

    <div class="footer-zone">
        <button class="clear-all-btn" onclick="clearAll()">⚠️ 刪除所有紀錄</button>
    </div>
</div>

<audio id="alarmSound" src="https://actions.google.com/sounds/v1/alarms/alarm_clock_beep.ogg" preload="auto"></audio>

<script>
    const subjectColors = {
        '國文': '#00adb5', '英文': '#ff5722', '數學': '#ffeb3b', 
        '物理': '#4caf50', '化學': '#9c27b0', '地理': '#2196f3', 
        '公民': '#e91e63', '歷史': '#607d8b'
    };

    let myPieChart = null, timerInterval, totalSeconds = 0, isRunning = false;

    // 初始化：設定日期時間並渲染
    window.onload = function() {
        const now = new Date();
        document.getElementById('date').value = now.toISOString().substring(0, 10);
        document.getElementById('time').value = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        renderAll();
    };

    // 儲存邏輯
    function saveData() {
        const subject = document.getElementById("subject").value;
        const chapter = document.getElementById("chapter").value;
        const studyMin = document.getElementById("studyMin").value;
        const date = document.getElementById("date").value;
        const time = document.getElementById("time").value;

        if (!chapter || !studyMin) { alert("請填寫完整的章節與時間！"); return; }

        const record = { 
            id: Date.now(), 
            subject, chapter, 
            studyMin: parseInt(studyMin), 
            date, time, 
            statusValue: "5" 
        };

        let data = JSON.parse(localStorage.getItem("studyRecords")) || [];
        data.push(record);
        localStorage.setItem("studyRecords", JSON.stringify(data));
        
        renderAll();
        document.getElementById("chapter").value = ""; 
        document.getElementById("studyMin").value = "";
    }

    // 更新單筆狀態
    function updateRecordStatus(recordId, newStatus, element) {
        let data = JSON.parse(localStorage.getItem("studyRecords")) || [];
        const index = data.findIndex(item => item.id == recordId);
        if (index !== -1) { 
            data[index].statusValue = newStatus; 
            localStorage.setItem("studyRecords", JSON.stringify(data)); 
            element.className = `table-select c-${newStatus}`; 
        }
    }

    // 渲染表格與圖表
    function renderAll() {
        const data = JSON.parse(localStorage.getItem("studyRecords")) || [];
        const tableBody = document.getElementById("tableBody");
        tableBody.innerHTML = "";

        data.slice().reverse().forEach(item => {
            const row = tableBody.insertRow();
            const color = subjectColors[item.subject] || '#fff';
            row.insertCell(0).innerHTML = `<b style="color:${color}">${item.subject}</b>`;
            row.insertCell(1).innerText = item.chapter;
            row.insertCell(2).innerText = item.date;
            
            const statusCell = row.insertCell(3);
            statusCell.innerHTML = `
                <select class="table-select c-${item.statusValue}" onchange="updateRecordStatus(${item.id}, this.value, this)">
                    <option value="5" class="c-5" ${item.statusValue == '5' ? 'selected' : ''}>完全理解</option>
                    <option value="4" class="c-4" ${item.statusValue == '4' ? 'selected' : ''}>大致理解</option>
                    <option value="3" class="c-3" ${item.statusValue == '3' ? 'selected' : ''}>部分理解</option>
                    <option value="2" class="c-2" ${item.statusValue == '2' ? 'selected' : ''}>不甚理解</option>
                    <option value="1" class="c-1" ${item.statusValue == '1' ? 'selected' : ''}>完全不解</option>
                </select>`;
            row.insertCell(4).innerText = item.studyMin;
        });
        updateChart(data);
    }

    // 更新圖表
    function updateChart(data) {
        const stats = {};
        data.forEach(item => stats[item.subject] = (stats[item.subject] || 0) + item.studyMin);
        const labels = Object.keys(stats);
        const colors = labels.map(label => subjectColors[label] || '#ccc');
        
        const ctx = document.getElementById('myPieChart').getContext('2d');
        if (myPieChart) myPieChart.destroy();
        myPieChart = new Chart(ctx, { 
            type: 'pie', 
            data: { 
                labels, 
                datasets: [{ data: Object.values(stats), backgroundColor: colors, borderColor: '#1a1a1a', borderWidth: 2 }] 
            }, 
            options: { plugins: { legend: { display: true, position: 'bottom', labels: { color: '#aaa', font: { size: 10 } } } } } 
        });
    }

    // 匯出 CSV 功能
    function exportCSV() {
        const data = JSON.parse(localStorage.getItem("studyRecords")) || [];
        if (data.length === 0) { alert("目前沒有紀錄可以匯出！"); return; }

        let csvContent = "\ufeff科目,章節,日期,時間,理解程度(級分),學習時間(min)\n";
        data.forEach(item => {
            csvContent += `${item.subject},${item.chapter},${item.date},${item.time},${item.statusValue},${item.studyMin}\n`;
        });

        const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `學習紀錄_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
    }

    // 計時器功能
    function toggleTimer() {
        if (!isRunning) {
            if (totalSeconds <= 0) totalSeconds = (parseInt(document.getElementById("setMinutes").value) || 0) * 60;
            if (totalSeconds <= 0) return;
            timerInterval = setInterval(() => {
                if (totalSeconds <= 0) { 
                    clearInterval(timerInterval); 
                    document.getElementById("alarmSound").play(); 
                    alert("專注時間結束！休息一下吧！"); 
                    resetTimer(); 
                    return; 
                }
                totalSeconds--;
                let m = Math.floor(totalSeconds / 60), s = totalSeconds % 60;
                document.getElementById("timerDisplay").innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }, 1000);
            isRunning = true;
        } else { 
            clearInterval(timerInterval); 
            isRunning = false; 
        }
    }

    function resetTimer() { 
        clearInterval(timerInterval); 
        isRunning = false; 
        totalSeconds = 0; 
        const mins = document.getElementById("setMinutes").value;
        document.getElementById("timerDisplay").innerText = mins.padStart(2, '0') + ":00"; 
    }
    
    function clearAll() { 
        if(confirm("確定要刪除所有歷史紀錄嗎？這將無法復原！")) { 
            localStorage.removeItem("studyRecords"); 
            location.reload(); 
        } 
    }
</script>
</body>
</html>
